<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MV Solutions - Orçamentos</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
</head>
<body>

<header class="topo">
    <div class="logo-area">
        <img src="assets/logo.jpeg">
        <div>
            <h1>MV Solutions</h1>
            <p>Soluções Inteligentes para o seu Empreendimento</p>
            <div class="contatos">
                <span>
                    <i class="fa-brands fa-whatsapp"></i>
                    (31) 98827-5579
                </span>
                <span>
                    <i class="fa-solid fa-envelope"></i>
                    marcellocalhas@hotmail.com
                </span>
                <span>
                    <i class="fa-brands fa-instagram"></i>
                    @marcellosolucoes
                </span>
            </div>
        </div>
    </div>
</header>

<main>
<section class="card">
        <!-- Contêiner do Título e dos Novos Botões Alternadores -->
        <div class="cabecalho-bloco" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 20px; gap: 10px;">
            <h2 style="margin: 0;">Novo Documento</h2>
            
            <div class="alternador-tipo" style="display: flex; gap: 10px;">
                <button type="button" id="btnTipoOrcamento" class="btn-tipo ativo" style="padding: 10px 25px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.3s; background-color: #12263a; color: white; border: 1px solid #007bff;">
                    Orçamento
                </button>
                <button type="button" id="btnTipoPedido" class="btn-tipo" style="padding: 10px 25px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.3s; background-color: #1e293b; color: #94a3b8;">
                    Pedido
                </button>
                <button type="button" id="btnTipoRecibo" class="btn-tipo" style="padding: 10px 25px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.3s; background-color: #1e293b; color: #94a3b8;">
                    Recibo
                </button>
            </div>
        </div>

        <!-- Input invisível para o sistema continuar salvando o tipo sem quebrar nada antigo -->
        <input type="hidden" id="tipo" value="Orçamento">

        <div class="linha">
            <div class="campo">
                <label>Cliente</label>
                <input type="text" id="cliente">
            </div>
            <div class="campo">
                <label>Telefone</label>
                <input type="text" id="telefone">
            </div>
        </div>
        <div class="linha">
            <div class="campo">
                <label>Endereço</label>
                <input type="text" id="endereco">
            </div>
            <div class="campo text-box-cidade">
                <label>Cidade</label>
                <input type="text" id="cidade" value="Belo Horizonte">
            </div>
            <div class="campo text-box-data">
                <label>Data</label>
                <input type="date" id="data">
            </div>
        </div>
    </section>
    <section class="card">
        <h2>Itens do Serviço</h2>
        <table id="tabelaItens">
            <thead>
                <tr>
                    <th>Qtd</th>
                    <th>Descrição</th>
                    <th>Valor Unitário</th>
                    <th>Total</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="itens">
            </tbody>
        </table>
        <br>
        <button id="btnAdicionar">
            + Adicionar Item
        </button>
    </section>

    <section class="card">
        <h2>Pagamento</h2>
        <div class="linha">
            <div class="campo">
                <label>Entrada</label>
                <input type="text" id="entrada">
            </div>
            <div class="campo">
                <label>Forma de Pagamento</label>
                <input type="text" id="pagamento">
            </div>
        </div>
        <div class="campo">
            <label>Observações</label>
            <textarea id="observacoes"></textarea>
        </div>
    </section>

    <!-- ESSA SEÇÃO TINHA SUMIDO DA SUA TELA POR ERRO DE SCRIPT -->
    <section class="card total-box">
        <h2>Total Geral</h2>
        <h1 id="totalGeral">
            R$ 0,00
        </h1>
        <div class="acoes">
            <button id="salvarPedido">
                Salvar Novo Pedido
            </button>
            <button id="atualizarPedido" style="display: none; background-color: #ff9800; color: white;">
                Salvar Alterações
            </button>
            <button id="gerarPDF">
                Gerar PDF
            </button>
            <button id="enviarWhats">
                WhatsApp
            </button>
            <button id="btnLimpar" style="background-color: #6c757d; color: white;">
                Limpar Tela
            </button>
        </div>
    </section>

    <!-- HISTÓRICO QUE TAMBÉM TINHA SUMIDO -->
    <section class="card">
        <h2>Histórico de Pedidos</h2>
        <input
            type="text"
            placeholder="Pesquisar cliente..."
            id="pesquisa">
        <br><br>
        <table>
            <thead>
                <tr>
                    <th>Nº</th>
                    <th>Cliente</th>
                    <th>Data</th>
                    <th>Total</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="historico">
            </tbody>
        </table>
    </section>
</main>

<!-- IMPRESCINDÍVEL: Bibliotecas carregadas estritamente nesta ordem no final do body -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

<!-- Seus scripts locais -->
<script src="js/app.js"></script>
<script src="js/pdf.js"></script>

</body>
</html>
